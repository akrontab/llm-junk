# --- Template (No ports or volumes here) ---
x-ollama-base: &ollama-base
  image: ollama/ollama:latest
  healthcheck:
    test: ["CMD", "ollama", "list"]
    interval: 10s
    timeout: 5s
    retries: 5
  networks:
    default:
      aliases:
        - ollama_service

services:
  ollama-gpu:
    <<: *ollama-base
    container_name: ollama_service
    profiles: ["gpu"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  ollama-cpu:
    <<: *ollama-base
    container_name: ollama_service
    profiles: ["cpu"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama

  ollama-puller:
    image: ollama/ollama:latest
    container_name: ollama_puller
    volumes:
      - ollama_storage:/root/.ollama
    # Connect to the same network as the main service
    networks:
      - default
    # This script starts a temporary server, pulls the models, then shuts down
    entrypoint: /bin/sh -c "ollama serve & sleep 5 && ollama pull llama3.2:3b && ollama pull qwen3-embedding && pkill ollama & sleep 5"
    depends_on:
      # No strict dependency needed if just filling the volume, 
      # but keeping it in the same stack.
      - chromadb

  chromadb:
    image: chromadb/chroma:0.5.23  # Pin to a version before the v1 API removal
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma  # Persist your index

  dotnet-api:
    build:
      context: .
      dockerfile: MyAiApi/dockerfile
    container_name: dotnet_api
    environment:
      - AI_ENDPOINT=http://ollama_service:11434
      - ASPNETCORE_URLS=http://+:8080
      - CHROMADB_ENDPOINT=http://chromadb:8000
    ports:
      - "5000:8080"
    # We remove the direct dependency on the ollama YAML key 
    # to prevent errors when one profile is missing.
    depends_on:
      chromadb:
        condition: service_started
      # API won't start until Puller exits 0
      ollama-puller:
        condition: service_completed_successfully

  file-watcher:
    build: 
      context: .
      dockerfile: MyFileWatcher/dockerfile
    container_name: file_watcher
    volumes:
      # Use a relative path so it works on both Linux and Windows
      - ./ai-docs:/watch_folder 
    environment:
      - AI_UPLOAD_URL=http://dotnet-api:8080/upload
    depends_on:
      - dotnet-api

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.0
    container_name: aspire-dashboard
    ports:
      - "18888:18888" # Dashboard UI (Browser)
      - "4317:18889" # OTLP gRPC (External 4317 -> Internal 18889)
      - "4318:18890" # OTLP HTTP (Optional: if you ever use web-based OTLP)
    environment:
      # Use ASPIRE_ prefix for modern versions
      - ASPIRE_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS=true

volumes:
  ollama_storage:
  chroma_data: